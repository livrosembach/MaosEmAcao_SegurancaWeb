{% extends "base.html" %}
{% load static %}

{% block title %}Mãos em Ação - Perfil da ONG{% endblock %}

{% block content %}
<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="nav-brand">Mãos em Ação</div>
        </div>
        <nav class="sidebar-menu">
            <a href="{% url 'ngo_dashboard' %}" class="sidebar-item">Dashboard</a>
            <a href="{% url 'ngo_opportunities' %}" class="sidebar-item">Gerenciar Oportunidades</a>
            <a href="{% url 'ngo_applicants' %}" class="sidebar-item">Inscritos</a>
            <a href="{% url 'ngo_profile' %}" class="sidebar-item">Perfil da ONG</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="navbar">
            <button class="mobile-menu-btn" type="button">&#9776;</button>
            <div class="nav-menu">
                <span class="nav-item">Olá, {{ user.username }}</span>
                <a href="{% url 'account_logout' %}" class="nav-item text-danger">Sair</a>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="page-header">
                <h1>Perfil da Organização</h1>
            </div>

            <div class="card" style="max-width:600px;">
                <div class="form-group">
                    <label class="form-label">Nome de usuário</label>
                    <input type="text" id="field-username" class="form-control" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="field-email" class="form-control" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone</label>
                    <input type="text" id="field-phone" class="form-control" placeholder="(XX) XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label class="form-label">Endereço</label>
                    <input type="text" id="field-address" class="form-control" placeholder="Rua, número, cidade">
                </div>
                <div class="form-group">
                    <label class="form-label">Descrição Pública</label>
                    <textarea id="field-description" class="form-control" rows="4" placeholder="Descreva a missão da sua organização..."></textarea>
                </div>
                <button id="save-btn" class="btn btn-primary" type="button">Salvar Alterações</button>
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/api.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const saveBtn = document.getElementById('save-btn');

    try {
        const profile = await API.profile.get();
        document.getElementById('field-username').value = profile.username || '';
        document.getElementById('field-email').value = profile.email || '';
        document.getElementById('field-phone').value = profile.phone || '';
        document.getElementById('field-address').value = profile.address || '';
        document.getElementById('field-description').value = profile.description || '';
    } catch (err) {
        API.showToast('Erro ao carregar perfil: ' + err.message, 'error');
    }

    saveBtn.addEventListener('click', async () => {
        API.setLoading(saveBtn, true);
        try {
            await API.profile.update({
                phone: document.getElementById('field-phone').value,
                address: document.getElementById('field-address').value,
                description: document.getElementById('field-description').value,
            });
            API.showToast('Perfil atualizado com sucesso!');
        } catch (err) {
            API.showToast(err.message, 'error');
        } finally {
            API.setLoading(saveBtn, false);
        }
    });
});
</script>
{% endblock %}
