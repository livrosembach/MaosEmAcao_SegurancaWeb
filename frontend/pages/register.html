<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mãos em Ação - Cadastro</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<body>

    <div class="auth-container" style="padding: 2rem;">
        <div class="card auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <div class="auth-logo">Registre-se</div>
                <p>Comece a fazer a diferença</p>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <button class="btn btn-primary profile-toggle" data-profile="voluntario" style="flex: 1;">Sou Voluntário</button>
                <button class="btn btn-secondary profile-toggle" data-profile="ong" style="flex: 1;">Sou ONG</button>
            </div>

            <!-- Form Voluntário -->
            <form id="volunteer-form">
                <div class="form-group">
                    <label class="form-label" for="name">Nome Completo</label>
                    <input type="text" class="form-control" required placeholder="João da Silva">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email-vol">E-mail</label>
                    <input type="email" class="form-control" required placeholder="joao@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pass-vol">Senha</label>
                    <input type="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="button" onclick="window.location.href='login.html'" class="btn btn-primary" style="width: 100%;">Cadastrar Voluntário</button>
            </form>

            <!-- Form ONG -->
            <form id="ngo-form" class="hidden">
                <div class="form-group">
                    <label class="form-label" for="ong-name">Nome da ONG</label>
                    <input type="text" class="form-control" required placeholder="Instituto Exemplo">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cnpj">CNPJ</label>
                    <input type="text" class="form-control" required placeholder="00.000.000/0000-00">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email-ong">E-mail Corporativo</label>
                    <input type="email" class="form-control" required placeholder="contato@instituto.org">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pass-ong">Senha</label>
                    <input type="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="button" onclick="window.location.href='login.html'" class="btn btn-primary" style="width: 100%;">Cadastrar ONG</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Já tem uma conta? <a href="login.html" class="text-primary">Faça login</a>
            </div>
        </div>
    </div>
        
<script src="../js/auth.js"></script>
</body></html>
