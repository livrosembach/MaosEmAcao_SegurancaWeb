<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mãos em Ação - Oportunidades</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="nav-brand">Mãos em Ação</div>
            </div>
            <nav class="sidebar-menu">
                <a href="volunteer-dashboard.html" class="sidebar-item">Voltar ao Painel</a>
                
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Navbar -->
            <header class="navbar">
                <button class="mobile-menu-btn">☰</button>
                <div class="nav-menu">
                    <span class="nav-item">Olá, Usuário</span>
                    <a href="login.html" class="nav-item text-danger">Sair</a>
                </div>
            </header>

            <div class="content-wrapper">
                
            <div class="page-header">
                <h1>Oportunidades Disponíveis</h1>
            </div>
            
            <div class="card opportunity-filters">
                <input type="text" id="searchOpportunity" class="form-control opportunity-search" placeholder="Busque por título ou ONG...">
                <select class="form-control" style="width:auto;">
                    <option value="">Todas as Categorias</option>
                    <option value="saude">Saúde</option>
                    <option value="educacao">Educação</option>
                </select>
                <select class="form-control" style="width:auto;">
                    <option value="">Qualquer Status</option>
                    <option value="aberta">Abertas</option>
                </select>
                <button class="btn btn-primary">Filtrar</button>
            </div>

            <div class="grid grid-cols-2 mt-4" style="margin-top:2rem;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Distribuição de Alimentos</h3>
                        <span class="badge badge-primary">Aberto</span>
                    </div>
                    <div class="card-body">
                        <p><strong>ONG:</strong> Ação Solidária</p>
                        <p><strong>Data:</strong> 22/06/2026</p>
                        <p><strong>Local:</strong> Praça Central</p>
                        <p><strong>Vagas:</strong> 10</p>
                    </div>
                    <div class="card-footer">
                        <a href="opportunity-details.html" class="btn btn-primary">Ver Mais</a>
                    </div>
                </div>
            </div>
        
            </div>
        </main>
    </div>
